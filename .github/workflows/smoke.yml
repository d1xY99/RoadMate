name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [staging, production]
        required: true
  workflow_run:
    workflows: [Deploy]
    types: [completed]
    branches: [main, staging]

concurrency:
  group: smoke-${{ (github.event_name == 'workflow_dispatch' && inputs.environment) || github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment) || (github.event.workflow_run.head_branch == 'main' && 'production') || 'staging' }}
    env:
      TARGET: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment) || (github.event.workflow_run.head_branch == 'main' && 'production') || 'staging' }}
      DISCORD_PRODUCTION_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_PRODUCTION_DEPLOY_WEBHOOK }}
      DISCORD_STAGING_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_STAGING_DEPLOY_WEBHOOK }}
      PRODUCTION_API_HEALTH_URL: ${{ secrets.PRODUCTION_API_HEALTH_URL }}
      PRODUCTION_WEB_URL: ${{ secrets.PRODUCTION_WEB_URL }}
      STAGING_API_HEALTH_URL: ${{ secrets.STAGING_API_HEALTH_URL }}
      STAGING_WEB_URL: ${{ secrets.STAGING_WEB_URL }}
      SMOKE_BRANCH: ${{ (github.event_name == 'workflow_dispatch' && github.ref_name) || github.event.workflow_run.head_branch }}
      SMOKE_SHA: ${{ (github.event_name == 'workflow_dispatch' && github.sha) || github.event.workflow_run.head_sha }}
    steps:
      - name: Wait for deploys to settle
        run: sleep 60

      - name: Smoke deployed URLs
        run: |
          if [ "$TARGET" = "production" ]; then
            WEB_URL="$PRODUCTION_WEB_URL"
            API_HEALTH_URL="$PRODUCTION_API_HEALTH_URL"
          else
            WEB_URL="$STAGING_WEB_URL"
            API_HEALTH_URL="$STAGING_API_HEALTH_URL"
          fi

          if [ -z "$WEB_URL" ]; then
            echo "::error::No frontend smoke URL configured for '$TARGET'."
            exit 1
          fi

          if [ -z "$API_HEALTH_URL" ]; then
            echo "::error::No backend health URL configured for '$TARGET'."
            exit 1
          fi

          curl --retry 6 --retry-delay 10 --retry-all-errors -fsS "$WEB_URL" \
            | grep -q "RoadMate"
          echo "Frontend smoke check passed: $WEB_URL"

          curl --retry 6 --retry-delay 10 --retry-all-errors -fsS "$API_HEALTH_URL" \
            | jq -e '.status == "ok"' >/dev/null
          echo "Backend smoke check passed: $API_HEALTH_URL"

      - name: Notify Discord
        if: failure()
        run: |
          if [ "$TARGET" = "production" ]; then
            WEBHOOK="$DISCORD_PRODUCTION_DEPLOY_WEBHOOK"
            LABEL="production"
          else
            WEBHOOK="$DISCORD_STAGING_DEPLOY_WEBHOOK"
            LABEL="staging"
          fi

          if [ -z "$WEBHOOK" ]; then
            echo "::warning::No Discord deploy webhook configured for '$TARGET'."
            exit 0
          fi

          TITLE="Smoke tests failed"
          DESCRIPTION="RoadMate $LABEL smoke checks need attention."
          STATE="Failed"
          COLOR="15158332"

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SHORT_SHA="${SMOKE_SHA::7}"

          PAYLOAD="$(jq -nc \
            --arg title "$TITLE" \
            --arg description "$DESCRIPTION" \
            --arg state "$STATE" \
            --arg target "$TARGET" \
            --arg branch "$SMOKE_BRANCH" \
            --arg sha "$SHORT_SHA" \
            --arg actor "$GITHUB_ACTOR" \
            --arg url "$RUN_URL" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson color "$COLOR" \
            '{
              username: "RoadMate Deploy Bot",
              embeds: [{
                title: $title,
                description: $description,
                color: $color,
                fields: [
                  { name: "Status", value: $state, inline: true },
                  { name: "Environment", value: $target, inline: true },
                  { name: "Branch", value: $branch, inline: true },
                  { name: "Commit", value: $sha, inline: true },
                  { name: "Triggered by", value: $actor, inline: true },
                  { name: "Workflow", value: ("[Open run](" + $url + ")"), inline: true }
                ],
                url: $url,
                footer: { text: $repo },
                timestamp: $timestamp
              }]
            }')"

          curl -fsS \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK"
