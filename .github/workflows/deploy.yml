name: Deploy

# One deploy per environment: applies DB migrations + triggers the Netlify
# build for that environment.
#   push to staging -> staging      push to main -> production
#   or run manually (Actions tab) and pick the environment.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [staging, production]
        required: true
  push:
    branches: [main, staging]

concurrency:
  group: deploy-${{ (github.event_name == 'workflow_dispatch' && inputs.environment) || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment) || (github.ref_name == 'main' && 'production') || 'staging' }}
    env:
      TARGET: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment) || (github.ref_name == 'main' && 'production') || 'staging' }}
      DISCORD_PRODUCTION_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_PRODUCTION_DEPLOY_WEBHOOK }}
      DISCORD_STAGING_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_STAGING_DEPLOY_WEBHOOK }}
      PRODUCTION_API_HEALTH_URL: ${{ secrets.PRODUCTION_API_HEALTH_URL }}
      PRODUCTION_WEB_URL: ${{ secrets.PRODUCTION_WEB_URL }}
      STAGING_API_HEALTH_URL: ${{ secrets.STAGING_API_HEALTH_URL }}
      STAGING_WEB_URL: ${{ secrets.STAGING_WEB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      - name: Apply DB migrations
        env:
          PROD_REF: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}
          PROD_PW: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
          STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
        run: |
          if [ "$TARGET" = "production" ]; then
            ENC=$(jq -rn --arg x "$PROD_PW" '$x|@uri')
            DB_URL="postgresql://postgres.${PROD_REF}:${ENC}@aws-1-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require"
          else
            DB_URL="$STAGING_DB_URL"
          fi
          if [ -z "$DB_URL" ]; then
            echo "::error::No database URL resolved for '$TARGET' — check environment secrets."
            exit 1
          fi
          bunx dbmate --migrations-dir ./packages/backend/migrations --no-dump-schema --url "$DB_URL" up

      - name: Trigger Netlify build
        env:
          PROD_HOOK: ${{ secrets.NETLIFY_PRODUCTION_BUILD_HOOK }}
          STAGING_HOOK: ${{ secrets.NETLIFY_STAGING_BUILD_HOOK }}
        run: |
          if [ "$TARGET" = "production" ]; then HOOK="$PROD_HOOK"; else HOOK="$STAGING_HOOK"; fi
          if [ -z "$HOOK" ]; then
            echo "::warning::No Netlify build hook for '$TARGET' — skipping web deploy."
            exit 0
          fi
          curl -fsS -X POST -d '{}' "$HOOK" >/dev/null
          echo "Triggered Netlify build for $TARGET"

      - name: Smoke deployed URLs
        run: |
          if [ "$TARGET" = "production" ]; then
            WEB_URL="$PRODUCTION_WEB_URL"
            API_HEALTH_URL="$PRODUCTION_API_HEALTH_URL"
          else
            WEB_URL="$STAGING_WEB_URL"
            API_HEALTH_URL="$STAGING_API_HEALTH_URL"
          fi

          if [ -z "$WEB_URL" ] && [ -z "$API_HEALTH_URL" ]; then
            echo "::warning::No smoke URLs configured for '$TARGET'."
            exit 0
          fi

          if [ -n "$WEB_URL" ]; then
            curl --retry 6 --retry-delay 10 --retry-all-errors -fsS "$WEB_URL" \
              | grep -q "RoadMate"
            echo "Frontend smoke check passed: $WEB_URL"
          fi

          if [ -n "$API_HEALTH_URL" ]; then
            curl --retry 6 --retry-delay 10 --retry-all-errors -fsS "$API_HEALTH_URL" \
              | jq -e '.status == "ok"' >/dev/null
            echo "Backend smoke check passed: $API_HEALTH_URL"
          fi

      - name: Notify Discord
        if: always()
        env:
          STATUS: ${{ job.status }}
        run: |
          if [ "$TARGET" = "production" ]; then
            WEBHOOK="$DISCORD_PRODUCTION_DEPLOY_WEBHOOK"
            LABEL="production"
          else
            WEBHOOK="$DISCORD_STAGING_DEPLOY_WEBHOOK"
            LABEL="staging"
          fi

          if [ -z "$WEBHOOK" ]; then
            echo "::warning::No Discord deploy webhook configured for '$TARGET'."
            exit 0
          fi

          if [ "$STATUS" = "success" ]; then
            TITLE="Deployment completed"
            DESCRIPTION="RoadMate $LABEL deploy finished successfully."
            STATE="Success"
            COLOR="3066993"
          else
            TITLE="Deployment failed"
            DESCRIPTION="RoadMate $LABEL deploy needs attention."
            STATE="Failed"
            COLOR="15158332"
          fi

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          SHORT_SHA="${GITHUB_SHA::7}"

          PAYLOAD="$(jq -nc \
            --arg title "$TITLE" \
            --arg description "$DESCRIPTION" \
            --arg state "$STATE" \
            --arg target "$TARGET" \
            --arg branch "$GITHUB_REF_NAME" \
            --arg sha "$SHORT_SHA" \
            --arg commit_url "$COMMIT_URL" \
            --arg actor "$GITHUB_ACTOR" \
            --arg url "$RUN_URL" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson color "$COLOR" \
            '{
              username: "RoadMate Deploy Bot",
              embeds: [{
                title: $title,
                description: $description,
                color: $color,
                fields: [
                  { name: "Status", value: $state, inline: true },
                  { name: "Environment", value: $target, inline: true },
                  { name: "Branch", value: $branch, inline: true },
                  { name: "Commit", value: ("[" + $sha + "](" + $commit_url + ")"), inline: true },
                  { name: "Triggered by", value: $actor, inline: true },
                  { name: "Workflow", value: ("[Open run](" + $url + ")"), inline: true }
                ],
                url: $url,
                footer: { text: $repo },
                timestamp: $timestamp
              }]
            }')"

          curl -fsS \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK"
