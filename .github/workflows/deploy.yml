name: Deploy

# One deploy per environment: applies DB migrations + triggers the Netlify
# build for that environment.
#   push to staging -> staging      push to main -> production
#   or run manually (Actions tab) and pick the environment.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [staging, production]
        required: true
  push:
    branches: [main, staging]

concurrency:
  group: deploy-${{ (github.event_name == 'workflow_dispatch' && inputs.environment) || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment) || (github.ref_name == 'main' && 'production') || 'staging' }}
    env:
      TARGET: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment) || (github.ref_name == 'main' && 'production') || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      - name: Apply DB migrations
        env:
          PROD_REF: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}
          PROD_PW: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
          STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
        run: |
          if [ "$TARGET" = "production" ]; then
            ENC=$(jq -rn --arg x "$PROD_PW" '$x|@uri')
            DB_URL="postgresql://postgres.${PROD_REF}:${ENC}@aws-1-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require"
          else
            DB_URL="$STAGING_DB_URL"
          fi
          if [ -z "$DB_URL" ]; then
            echo "::error::No database URL resolved for '$TARGET' — check environment secrets."
            exit 1
          fi
          bunx dbmate --migrations-dir ./packages/backend/migrations --no-dump-schema --url "$DB_URL" up

      - name: Trigger Netlify build
        env:
          PROD_HOOK: ${{ secrets.NETLIFY_PRODUCTION_BUILD_HOOK }}
          STAGING_HOOK: ${{ secrets.NETLIFY_STAGING_BUILD_HOOK }}
        run: |
          if [ "$TARGET" = "production" ]; then HOOK="$PROD_HOOK"; else HOOK="$STAGING_HOOK"; fi
          if [ -z "$HOOK" ]; then
            echo "::warning::No Netlify build hook for '$TARGET' — skipping web deploy."
            exit 0
          fi
          curl -fsS -X POST -d '{}' "$HOOK" >/dev/null
          echo "Triggered Netlify build for $TARGET"
