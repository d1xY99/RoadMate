name: Deploy DB migrations

# Migrations reach a remote DB ONLY here — never from a laptop.
#   push to `staging` -> staging Supabase
#   push to `main`    -> production Supabase
on:
  workflow_dispatch: # allow manual runs from the Actions tab
  push:
    branches: [main, staging]
    # No path filter: dbmate up is idempotent (applies only pending migrations),
    # so it's safe to run on every push — and it reliably triggers on a brand-new
    # branch identical to main (a path filter would skip that case).

concurrency:
  group: db-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # main -> `production` environment, staging -> `staging` environment.
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      - name: Apply pending migrations (dbmate up)
        env:
          REF_NAME: ${{ github.ref_name }}
          # production (main): URL is built from these two secrets
          PROD_REF: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}
          PROD_PW: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
          # staging: full connection string secret
          STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
        run: |
          if [ "$REF_NAME" = "main" ]; then
            # URL-encode the password (jq @uri) so special chars like ! survive.
            ENC_PW=$(jq -rn --arg x "$PROD_PW" '$x|@uri')
            DB_URL="postgresql://postgres.${PROD_REF}:${ENC_PW}@aws-1-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require"
          else
            DB_URL="$STAGING_DB_URL"
          fi
          if [ -z "$DB_URL" ]; then
            echo "::error::No database URL resolved for branch '$REF_NAME' — check the environment secrets."
            exit 1
          fi
          bunx dbmate --migrations-dir ./packages/backend/migrations --no-dump-schema --url "$DB_URL" up
