name: Validate DB migrations

# On every PR that touches migrations: spin up a throwaway local Supabase
# (gives us the auth schema the migration depends on) and apply the migration
# up → down → up to prove it's valid AND reversible before it can reach main.
on:
  pull_request:
    paths:
      - 'packages/backend/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/db-validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      LOCAL_DB_URL: postgresql://postgres:postgres@127.0.0.1:54422/postgres?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: bun install --frozen-lockfile

      - name: Start local Supabase (provides auth schema)
        run: supabase start

      - name: Apply migrations (up)
        run: bunx dbmate --migrations-dir ./packages/backend/migrations --no-dump-schema --url "$LOCAL_DB_URL" up

      - name: Verify reversibility (down then up)
        run: |
          bunx dbmate --migrations-dir ./packages/backend/migrations --no-dump-schema --url "$LOCAL_DB_URL" down
          bunx dbmate --migrations-dir ./packages/backend/migrations --no-dump-schema --url "$LOCAL_DB_URL" up
